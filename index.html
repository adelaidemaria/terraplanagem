    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        
        @media print {
            @page {
                size: A4 portrait !important;
                margin: 1cm; /* Margem padrão de papel */
            }
            
            /* Reseta tudo que pode esconder o conteúdo */
            html, body {
                height: auto !important;
                overflow: visible !important;
                background: white !important;
                margin: 0 !important;
                padding: 0 !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }

            /* Garante que o container principal não restrinja a altura */
            #root, main, .p-8 {
                height: auto !important;
                overflow: visible !important;
                display: block !important;
                margin: 0 !important;
                padding: 0 !important;
                width: 100% !important;
            }

            /* Forçar visibilidade do conteúdo do relatório */
            .print-visible {
                display: block !important;
                visibility: visible !important;
            }

            /* Esconder componentes de interface */
            .print-hidden, 
            .print\:hidden {
                display: none !important;
            }

            /* Ajuste de tabelas para quebras de página */
            table {
                width: 100% !important;
                border-collapse: collapse !important;
                page-break-inside: auto;
            }
            tr {
                page-break-inside: avoid;
                page-break-after: auto;
            }
            thead {
                display: table-header-group;
            }
        }
    </style>
